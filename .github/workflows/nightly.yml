# Nightly build → single rolling 'nightly' pre-release.
#
# Cross-compiles slopstudio.exe (the editor, a Win64 PE) with mingw via the
# Nix dev shell, then updates ONE long-lived pre-release tagged `nightly`.
#
# Why one rolling release: GitHub notifies watchers when a *new* release is
# published, but NOT when an existing release's assets are updated. So we keep
# `nightly` stable and clobber its asset each run — watchers are pinged at most
# once (when `nightly` first appears). It is prerelease + make_latest:false so
# it never becomes the repo's "latest". Real milestone tags (vX.Y) are cut by
# hand, separately, and DO notify.
#
# The editor ships NO assets: the stock host rig + backgrounds are a separate
# release asset (stock-assets.zip) fetched on first run — see the README.

name: nightly

on:
  schedule:
    - cron: '0 6 * * *'        # daily, 06:00 UTC
  workflow_dispatch: {}         # manual "Run workflow" button

permissions:
  contents: write               # create/update the 'nightly' release

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history for the release-notes git log

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build editor (mingw cross-compile)
        run: nix develop --command make -C editor

      - name: Sanity — it's a PE and non-trivial
        run: |
          test -f build/slopstudio.exe
          file build/slopstudio.exe | grep -qi 'PE32'
          test "$(stat -c%s build/slopstudio.exe)" -gt 1000000

      - name: Compose release notes
        run: |
          {
            echo "Automated nightly build of the slopstudio editor — an unsigned Win64 PE."
            echo
            echo "Source commit: \`${GITHUB_SHA}\`"
            echo "Built: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo
            echo "Runs on Windows (native) or WSL2 via WSLInterop. On first run it"
            echo "fetches the stock host rig + backgrounds (stock-assets.zip) — see the README."
            echo
            echo "### Recent changes"
            git log -15 --pretty='- %s (%h)'
          } > release-notes.md

      # Move the 'nightly' tag onto the commit we just built (an existing
      # release attaches to the tag but never repoints it → stale source links).
      - name: Repoint 'nightly' tag to the built commit
        run: |
          git tag -f nightly "${GITHUB_SHA}"
          git push -f origin "refs/tags/nightly"

      - name: Publish to rolling 'nightly' pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: Nightly
          prerelease: true
          make_latest: false
          body_path: release-notes.md
          files: build/slopstudio.exe
          fail_on_unmatched_files: true
